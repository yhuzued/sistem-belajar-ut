name: Deploy Portal to GitHub Pages

on:
  push:
    branches:
      - main # Memicu aksi saat Anda push ke branch main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate Dynamic Index
        run: python generate_index.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "." # Mengunggah seluruh direktori termasuk folder materi dan index.html hasil generate

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
